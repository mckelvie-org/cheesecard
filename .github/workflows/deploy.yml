name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  pages: read

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v5

      - name: Check if branch is enabled for deployment
        id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          DEPLOY_BRANCHES="${{ vars.DEPLOY_BRANCHES }}"
          [[ " $DEPLOY_BRANCHES " =~ " $BRANCH " ]] && RESULT=true || RESULT=false
          echo "should_deploy=$RESULT" >> $GITHUB_OUTPUT

  deploy:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute deploy vars
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"
          UPPER=$(echo "$BRANCH" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          STAGE_VAR="BRANCH_${UPPER}_STAGE"
          STAGE="${!STAGE_VAR}"
          if [ -z "$STAGE" ]; then
            STAGE="$UPPER"
          fi

          IS_MAIN=$([[ "$STAGE" == "MAIN" ]] && echo "true" || echo "false")
          SUBPATH="stage/$BRANCH"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"

          CNAME=$(gh api repos/${{ github.repository }}/pages --jq '.cname // ""' 2>/dev/null || echo "")

          if [ -n "$CNAME" ]; then
            if [ "$IS_MAIN" = "true" ]; then
              BASE_PATH="/"
            else
              BASE_PATH="/$SUBPATH/"
            fi
          else
            if [ "$IS_MAIN" = "true" ]; then
              BASE_PATH="/$REPO_NAME/"
            else
              BASE_PATH="/$REPO_NAME/$SUBPATH/"
            fi
          fi

          echo "is_main=$IS_MAIN" >> $GITHUB_OUTPUT
          echo "stage=$STAGE" >> $GITHUB_OUTPUT
          echo "subpath=$SUBPATH" >> $GITHUB_OUTPUT
          echo "base_path=$BASE_PATH" >> $GITHUB_OUTPUT
          echo "cname=$CNAME" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.vars.outputs.base_path }}
          VITE_SUPABASE_URL: ${{ secrets[format('STAGE_{0}_SUPABASE_URL', steps.vars.outputs.stage)] }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets[format('STAGE_{0}_SUPABASE_PUBLISHABLE_KEY', steps.vars.outputs.stage)] }}

      - name: Prepare gh-pages content
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          mkdir -p /tmp/combined
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages | tar -x -C /tmp/combined/
          fi
          if [ "$IS_MAIN" = "true" ]; then
            # Replace root, preserve stage/
            cp -r /tmp/combined/stage dist/stage 2>/dev/null || true
          else
            # Replace stage/<branch>/, preserve everything else
            SUBPATH="${{ steps.vars.outputs.subpath }}"
            rm -rf /tmp/combined/$SUBPATH
            mkdir -p /tmp/combined/$SUBPATH
            cp -r dist/. /tmp/combined/$SUBPATH/
            rm -rf dist
            mv /tmp/combined dist
          fi
        env:
          IS_MAIN: ${{ steps.vars.outputs.is_main }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          cname: ${{ steps.vars.outputs.cname }}
