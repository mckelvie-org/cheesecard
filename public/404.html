<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cheese Club</title>
  <script>
    // SPA redirect for GitHub Pages project sites (hosted at /reponame)
    // Preserves the first two path segments (e.g. /cheesecard) as the base
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
